<!DOCTYPE html>
<html lang="pt-BR">

  <!-- Bootstrap 5 CSS -->

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

  <link rel="stylesheet" href="assets/css/components.css">
  <link rel="stylesheet" href="assets/css/responsive.css">

  <nav class="navbar navbar-expand-lg navbar-light shadow-sm" style="background-color: #2B4138;">
    <div class="container">
      <a class="navbar-brand" href="#/">
        <span class="ms-2 fw-bold" style="color: #ffffff;">♻️ ReciclaInfo</span>
      </a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item" >

          <li class="nav-item">
            <a class="nav-link" href="#/mapa">Mapa</a>

          <li class="nav-item">
            <a class="nav-link" href="#/solicitar">Solicitar Coleta</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="#/denunciar">Denunciar</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="#/educativo">Dicas</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="#/perfil">Perfil</a>
          </li>
        </ul>
      </div>
    </div>

  <main id="app-container" class="container-fluid p-0">

    <div class="loader-content">
      <div class="spinner-border text-primary" role="status">
        <span class="visually-hidden">Carregando...</span>
      </div>
      <p class="loader-message mt-3">Carregando...</p>
    </div>
  </div>

  <!-- Bootstrap 5 JS Bundle -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

  <!-- Configuration -->
  <script src="assets/js/config.js"></script>

  <script src="assets/js/models/Usuario.js"></script>
  <script src="assets/js/models/Ponto.js"></script>
  <script src="assets/js/models/Solicitacao.js"></script>
  <script src="assets/js/models/Denuncia.js"></script>

  <script src="assets/js/services/StorageService.js"></script>

  <script src="assets/js/data/seed.js"></script>

  <!-- Router and App -->
  <script src="assets/js/router.js"></script>
